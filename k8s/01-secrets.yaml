# ── AWS credentials ──────────────────────────────────────────────────────────
# Replace the placeholder values with your actual AWS credentials.
# In production, prefer an IAM role attached to the node/pod identity.
#
# Quick alternative (no file edit needed):
#   kubectl create secret generic aws-credentials -n gravitino \
#     --from-literal=AWS_ACCESS_KEY_ID=<your-key> \
#     --from-literal=AWS_SECRET_ACCESS_KEY=<your-secret> \
#     --from-literal=AWS_REGION=<your-region>
#
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: gravitino
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_YOUR_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_YOUR_SECRET_KEY"
  AWS_REGION: "ap-south-1"
---
# ── OAuth credentials ─────────────────────────────────────────────────────────
# OAUTH_SIGN_KEY_B64  : base64(raw HMAC secret). Gravitino and the OAuth server
#                       MUST share the same value.
#                       To generate a new key:
#                         openssl rand -base64 32
#                       Then base64-encode it again:
#                         echo -n "<output>" | base64
#
# OAUTH_CLIENT_SECRET : the client_secret Firebolt (or Spark) uses when
#                       requesting tokens.  Change to a strong random string.
#
apiVersion: v1
kind: Secret
metadata:
  name: oauth-credentials
  namespace: gravitino
type: Opaque
stringData:
  OAUTH_SIGN_KEY_B64: "Z3Jhdml0aW5vLWljZWJlcmctcmVzdC1vYXV0aC1rZXktMjAyNg=="
  OAUTH_CLIENT_SECRET: "firebolt-secret"
