# AWS credentials for S3 access.
# Replace the values below with your actual AWS credentials.
# In production, use an IAM role-based approach instead of static keys.
#
# To create this secret:
#   kubectl create secret generic aws-credentials -n gravitino \
#     --from-literal=AWS_ACCESS_KEY_ID=<your-key> \
#     --from-literal=AWS_SECRET_ACCESS_KEY=<your-secret> \
#     --from-literal=AWS_REGION=<your-region>
#
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: gravitino
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_YOUR_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_YOUR_SECRET_KEY"
  AWS_REGION: "ap-south-1"
