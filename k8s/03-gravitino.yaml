apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravitino-iceberg-rest
  namespace: gravitino
  labels:
    app: gravitino-iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gravitino-iceberg-rest
  template:
    metadata:
      labels:
        app: gravitino-iceberg-rest
    spec:
      containers:
        - name: gravitino-iceberg-rest
          image: apache/gravitino-iceberg-rest:1.2.0
          ports:
            - name: iceberg-rest
              containerPort: 9001
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          # Config from ConfigMap
          envFrom:
            - configMapRef:
                name: gravitino-config
          # AWS credentials from Secret
          env:
            - name: GRAVITINO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: GRAVITINO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /iceberg/v1/config
              port: 9001
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /iceberg/v1/config
              port: 9001
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gravitino-iceberg-rest
  namespace: gravitino
  labels:
    app: gravitino-iceberg-rest
spec:
  selector:
    app: gravitino-iceberg-rest
  ports:
    - name: iceberg-rest
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
# Optional: expose externally for testing (use LoadBalancer or Ingress in production)
apiVersion: v1
kind: Service
metadata:
  name: gravitino-iceberg-rest-external
  namespace: gravitino
  labels:
    app: gravitino-iceberg-rest
spec:
  selector:
    app: gravitino-iceberg-rest
  ports:
    - name: iceberg-rest
      port: 9001
      targetPort: 9001
      nodePort: 30901
  type: NodePort
