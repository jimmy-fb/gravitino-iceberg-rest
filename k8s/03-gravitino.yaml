apiVersion: apps/v1
kind: Deployment
metadata:
  name: gravitino-iceberg-rest
  namespace: gravitino
  labels:
    app: gravitino-iceberg-rest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gravitino-iceberg-rest
  template:
    metadata:
      labels:
        app: gravitino-iceberg-rest
    spec:
      containers:
        - name: gravitino-iceberg-rest
          image: apache/gravitino-iceberg-rest:1.2.0
          # The startup script:
          #  1. Runs rewrite_config.py to translate GRAVITINO_* env vars into
          #     the conf file (this is what the image does by default).
          #  2. Appends OAuth authenticator properties that have no env-var
          #     equivalent in rewrite_config.py.
          #  3. Launches the server.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cd /root/gravitino-iceberg-rest-server

              # Step 1: translate GRAVITINO_* env vars → conf file
              python bin/rewrite_config.py

              # Step 2: append OAuth config (values come from env vars)
              printf "\n# OAuth2 authenticator\n" \
                >> conf/gravitino-iceberg-rest-server.conf
              printf "gravitino.authenticators = oauth\n" \
                >> conf/gravitino-iceberg-rest-server.conf
              printf "gravitino.authenticator.oauth.signAlgorithmType = HS256\n" \
                >> conf/gravitino-iceberg-rest-server.conf
              printf "gravitino.authenticator.oauth.serviceAudience = %s\n" \
                "${OAUTH_AUDIENCE}" >> conf/gravitino-iceberg-rest-server.conf
              printf "gravitino.authenticator.oauth.defaultSignKey = %s\n" \
                "${OAUTH_SIGN_KEY_B64}" >> conf/gravitino-iceberg-rest-server.conf
              printf "gravitino.authenticator.oauth.tokenPath = %s\n" \
                "${OAUTH_TOKEN_PATH}" >> conf/gravitino-iceberg-rest-server.conf
              printf "gravitino.authenticator.oauth.serverUri = %s\n" \
                "${OAUTH_SERVER_URI}" >> conf/gravitino-iceberg-rest-server.conf

              echo "=== gravitino-iceberg-rest-server.conf ==="
              cat conf/gravitino-iceberg-rest-server.conf
              echo "=========================================="

              # Step 3: start the server
              exec ./bin/gravitino-iceberg-rest-server.sh run
          ports:
            - name: iceberg-rest
              containerPort: 9001
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: gravitino-config
          env:
            # S3 credentials from aws-credentials Secret
            - name: GRAVITINO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: GRAVITINO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: AWS_SECRET_ACCESS_KEY
            # OAuth signing key from oauth-credentials Secret
            - name: OAUTH_SIGN_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: oauth-credentials
                  key: OAUTH_SIGN_KEY_B64
          # Use a TCP probe — the HTTP /config endpoint requires a Bearer token
          # once OAuth is enabled, so an HTTP probe would always return 401.
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 40
            periodSeconds: 15
---
# Internal service (used by Spark, Flink, and the OAuth server itself)
apiVersion: v1
kind: Service
metadata:
  name: gravitino-iceberg-rest
  namespace: gravitino
  labels:
    app: gravitino-iceberg-rest
spec:
  selector:
    app: gravitino-iceberg-rest
  ports:
    - name: iceberg-rest
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
# External service — NodePort for testing from outside the cluster.
# Replace with an Ingress + TLS in production.
apiVersion: v1
kind: Service
metadata:
  name: gravitino-iceberg-rest-external
  namespace: gravitino
  labels:
    app: gravitino-iceberg-rest
spec:
  selector:
    app: gravitino-iceberg-rest
  ports:
    - name: iceberg-rest
      port: 9001
      targetPort: 9001
      nodePort: 30901
  type: NodePort
