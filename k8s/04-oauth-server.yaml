##############################################################################
# Minimal OAuth2 token server for Gravitino Iceberg REST authentication.
#
# What it does:
#   • Accepts POST /oauth/tokens  (OAuth2 client_credentials grant)
#   • Issues HS256-signed JWT tokens that Gravitino validates
#   • Exposes GET  /health  for readiness/liveness probes
#
# No external dependencies — pure Python 3 stdlib only.
#
# Shared secret:
#   The OAUTH_SIGN_KEY_B64 value MUST be identical in:
#     • This server   (from oauth-credentials Secret)
#     • Gravitino     (also from oauth-credentials Secret)
#   Both are mounted from the same Secret, so they stay in sync automatically.
##############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth-server-code
  namespace: gravitino
data:
  server.py: |
    #!/usr/bin/env python3
    """
    Minimal OAuth2 client_credentials token server.
    Issues HS256-signed JWTs accepted by Gravitino's StaticSignKeyValidator.
    Pure stdlib — no pip install required.
    """
    import base64, hashlib, hmac, json, os, time
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from urllib.parse import parse_qs

    # ── Configuration (injected by the Deployment env vars) ─────────────────
    SIGN_KEY_B64    = os.environ["OAUTH_SIGN_KEY_B64"]
    CLIENT_ID       = os.environ.get("OAUTH_CLIENT_ID",     "firebolt")
    CLIENT_SECRET   = os.environ["OAUTH_CLIENT_SECRET"]
    AUDIENCE        = os.environ.get("OAUTH_AUDIENCE",      "gravitino")
    TOKEN_TTL       = int(os.environ.get("TOKEN_TTL",       "3600"))
    PORT            = int(os.environ.get("PORT",            "8080"))

    # Decode the shared signing key once at startup
    _SIGN_KEY: bytes = base64.b64decode(SIGN_KEY_B64 + "==")

    def _b64url(data: bytes) -> str:
        return base64.urlsafe_b64encode(data).rstrip(b"=").decode()

    def _make_jwt(subject: str) -> str:
        now = int(time.time())
        header  = _b64url(json.dumps({"alg": "HS256", "typ": "JWT"},
                                     separators=(",", ":")).encode())
        claims  = {"iss": "gravitino-oauth", "sub": subject, "aud": AUDIENCE,
                   "iat": now, "exp": now + TOKEN_TTL}
        payload = _b64url(json.dumps(claims, separators=(",", ":")).encode())
        msg     = f"{header}.{payload}".encode()
        sig     = hmac.new(_SIGN_KEY, msg, hashlib.sha256).digest()
        return f"{header}.{payload}.{_b64url(sig)}"

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):        # stdout, picked up by kubectl logs
            print(fmt % args, flush=True)

        def do_GET(self):
            if self.path == "/health":
                self._json(200, {"status": "ok"})
            else:
                self._json(404, {"error": "not_found"})

        def do_POST(self):
            if self.path not in ("/oauth/tokens", "/oauth2/token"):
                self._json(404, {"error": "not_found"})
                return

            length  = int(self.headers.get("Content-Length", 0))
            body    = self.rfile.read(length).decode()
            params  = {k: v[0] for k, v in parse_qs(body).items()}

            grant   = params.get("grant_type",    "")
            cid     = params.get("client_id",     "")
            csecret = params.get("client_secret", "")

            if grant != "client_credentials":
                self._json(400, {"error": "unsupported_grant_type"})
                return
            if cid != CLIENT_ID or csecret != CLIENT_SECRET:
                self._json(401, {"error": "invalid_client"})
                return

            token = _make_jwt(cid)
            self._json(200, {
                "access_token": token,
                "token_type":   "bearer",
                "expires_in":   TOKEN_TTL,
            })

        def _json(self, code: int, body: dict):
            data = json.dumps(body).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

    if __name__ == "__main__":
        print(f"OAuth token server listening on :{PORT}", flush=True)
        print(f"  audience   : {AUDIENCE}", flush=True)
        print(f"  client_id  : {CLIENT_ID}", flush=True)
        print(f"  token_ttl  : {TOKEN_TTL}s", flush=True)
        HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-server
  namespace: gravitino
  labels:
    app: oauth-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth-server
  template:
    metadata:
      labels:
        app: oauth-server
    spec:
      containers:
        - name: oauth-server
          image: python:3.11-slim
          command:
            - python
            - /app/server.py
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          envFrom:
            - configMapRef:
                name: gravitino-config    # provides OAUTH_AUDIENCE, OAUTH_CLIENT_ID, etc.
          env:
            - name: OAUTH_SIGN_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: oauth-credentials
                  key: OAUTH_SIGN_KEY_B64
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-credentials
                  key: OAUTH_CLIENT_SECRET
          volumeMounts:
            - name: server-code
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: server-code
          configMap:
            name: oauth-server-code
---
# Internal service (used by Gravitino to advertise the token endpoint)
apiVersion: v1
kind: Service
metadata:
  name: oauth-server
  namespace: gravitino
  labels:
    app: oauth-server
spec:
  selector:
    app: oauth-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# External NodePort — allows Firebolt Cloud or a developer to fetch tokens
# from outside the cluster during testing.
# In production replace with Ingress + TLS.
apiVersion: v1
kind: Service
metadata:
  name: oauth-server-external
  namespace: gravitino
  labels:
    app: oauth-server
spec:
  selector:
    app: oauth-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30902
  type: NodePort
